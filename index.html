<html>
<head>
<link rel="stylesheet" href="style.css">

</head>

<body>
    <h1>
        Compound Interest Calculator

    </h1>
    <div>
        <label for="initial-deposit">Initial Deposit ($):</label>
        <input type="number" id="initial-deposit">
    </div>
    <div>
        <label for="monthly-contribution">Monthly Contribution:</label>
        <input type="number" id="monthly-contribution">
    </div>
    <div>
        <label for="estimated-annual-return">Estimated Annual Return:</label>
        <input type="number" id="estimated-annual-return">
    </div>
    <div>
        <label for="investment-horizon">Investment Horizon:</label>
        <input type="number" id="investment-horizon">
    </div>
    <button type="button" id="button">Calculate</button>

    <canvas id="interest-chart"></canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="script.js"></script>


</body>

</html>
