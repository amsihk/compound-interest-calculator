<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compound Interest Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Compound Interest Calculator</h1>

    <div class="container">

        <!-- Input Panel -->
        <div class="input-section">

            <div>
                <label for="initial-deposit">Initial Deposit</label>
                <input type="range" id="initial-deposit" min="0" max="1000000" step="5000" value="10000">
                <input type="text" id="initial-deposit-value" class="value-input"> kr
            </div>

            <div>
                <label for="monthly-contribution">Monthly Contribution</label>
                <input type="range" id="monthly-contribution" min="0" max="50000" step="500" value="2000">
                <input type="text" id="monthly-contribution-value" class="value-input"> kr
            </div>

            <div>
                <label for="estimated-annual-return">Estimated Annual Return</label>
                <input type="range" id="estimated-annual-return" min="0" max="25" step="0.5" value="8">
                <input type="text" id="estimated-annual-return-value" class="value-input"> %
            </div>

            <div>
                <label for="investment-horizon">Investment Horizon</label>
                <input type="range" id="investment-horizon" min="1" max="50" step="1" value="10">
                <input type="text" id="investment-horizon-value" class="value-input"> years
            </div>

        </div>

        <!-- Output Panel -->
        <div class="output-section">

            <canvas id="interest-chart"></canvas>

            <div class="results-wrapper">

                <div class="result-card primary-result">
                    <p class="result-label">Total Value</p>
                    <p class="result-number">
                        <span id="total-value">0</span><span class="kr-suffix">kr</span>
                    </p>
                </div>

                <div class="result-card secondary-result">
                    <p class="result-label">Interest Earned</p>
                    <p class="result-number">
                        +<span id="interest-earned">0</span><span class="kr-suffix">kr</span>
                    </p>
                </div>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>

</body>
</html>
